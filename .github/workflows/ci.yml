name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Lint client
        run: npm run lint:client
      - name: Lint server
        run: npm run lint:server

  test-client:
    name: Test Client
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Vitest with coverage
        run: npm run test:coverage --workspace=client
      - name: Upload client coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: client-coverage
          path: client/coverage
          retention-days: 7

  test-server:
    name: Test Server
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Jest with coverage
        run: npm run test:coverage --workspace=server
      - name: Upload server coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: server-coverage
          path: server/coverage
          retention-days: 7

  build:
    name: Build Client
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test-client]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: false

# E2E 不在 CI 跑：个人项目不建独立 Supabase 测试环境。
# 本地用 `cd client && npm run test:e2e` 发版前/大功能改动时自测。
